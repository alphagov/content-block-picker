name: Lint

on: workflow_call

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint
